<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCINTILLA · ALLOCATION</title>
<style>body{background:#0a0a0f;color:#8a8aa0;font-family:ui-monospace,Menlo,monospace;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}</style>
</head>
<body>
<div id="boot">loading allocation module…</div>
<script>
// scintillahub.ai/allocation — standalone route, NOT part of the hub app.
// Pulls the live module from the allocation project so this file never needs updating.
fetch('https://allocation.scintillahub.ai/', {cache:'no-store'})
  .then(r => { if (!r.ok) throw new Error('module fetch ' + r.status); return r.text(); })
  .then(html => { document.open(); document.write(html); document.close(); })
  .catch(e => { document.getElementById('boot').textContent = 'module unavailable: ' + e.message; });
</script>
</body>
</html>
