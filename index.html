<style>
  :root{--bg:#0A0A0F;--panel:#0D1118;--line:#1A1A2A;--line2:#252538;--ink:#E8E8F0;--ink2:#A0A0C0;--dim:#4A4A6A;--mute:#2A2A3A;--crk:#00D4FF;
        --bull:#00FFA3;--bear:#FF2D55;--mono:"SF Mono",ui-monospace,Menlo,monospace;--sans:ui-sans-serif,-apple-system,"Helvetica Neue",sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{padding:22px 26px 30px;font-size:12px}
  .stamp{font-family:var(--mono);font-size:8.5px;letter-spacing:.32em;color:var(--dim);text-transform:uppercase;display:flex;justify-content:space-between;margin-bottom:14px}
  .stamp .crk{color:var(--crk)}
  .head{display:flex;align-items:center;gap:14px;border:0.8px solid rgba(0,212,255,.18);padding:12px 18px;margin-bottom:10px}
  .word{flex:1;text-align:center;font-weight:200;letter-spacing:.7em;font-size:20px;color:var(--ink)}
  .tre{filter:drop-shadow(0 0 5px var(--crk)) drop-shadow(0 0 14px rgba(0,212,255,.35))}
  .srch{font-size:10px;letter-spacing:.2em;color:var(--ink2);text-transform:uppercase}
  .tabs{display:flex;gap:0;border:0.8px solid rgba(0,212,255,.12);margin-bottom:14px}
  .tab{flex:1;text-align:center;padding:9px 4px;font-size:10px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-right:0.6px solid var(--line)}
  .tab:last-child{border-right:none}
  .tab.on{color:var(--crk);font-weight:500;box-shadow:inset 0 -2px 0 var(--crk)}
  .grid{display:grid;grid-template-columns:360px 1fr 320px;gap:14px}
  .zone{border:0.8px solid rgba(0,212,255,.22);padding:14px 16px;min-height:540px}
  .zlabel{font-family:var(--mono);font-size:8px;letter-spacing:.35em;color:var(--dim);text-transform:uppercase;margin-bottom:14px}
  /* left reading */
  .rtk{font-weight:200;letter-spacing:.25em;font-size:30px;margin-bottom:2px}
  .rco{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
  .rprice{display:flex;align-items:baseline;gap:9px;font-weight:200;font-size:34px;color:var(--ink);font-variant-numeric:tabular-nums;letter-spacing:.01em;margin:2px 0 16px}
  .rprice svg{align-self:center;flex:none;opacity:.95}
  .rprice .lbl{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase}
  .syschip{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:8.5px;letter-spacing:.22em;color:var(--ink2);text-transform:uppercase;text-decoration:none;border:0.7px solid rgba(0,212,255,.2);border-radius:20px;padding:5px 11px}
  .syschip .ld{width:8px;height:8px;border-radius:50%;background:var(--dim)}
  .syschip .ld.live{background:var(--bull);animation:sysp 1.3s infinite}
  .syschip .ld.idle{background:#FFC24B}.syschip .ld.down{background:var(--bear)}
  @keyframes sysp{0%{box-shadow:0 0 0 0 rgba(0,255,163,.5)}70%{box-shadow:0 0 0 7px rgba(0,255,163,0)}100%{box-shadow:0 0 0 0 rgba(0,255,163,0)}}
  .rgeiger{font-weight:200;font-size:54px;line-height:1;font-variant-numeric:tabular-nums}
  .rband{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;margin:6px 0 8px}
  .gam{font-size:26px;opacity:.45;margin-right:6px;font-style:italic}
  .dens{font-size:15px;letter-spacing:5px;margin:0 0 14px;text-shadow:0 0 8px currentColor}
  .rvol{font-family:var(--mono);font-size:12px;letter-spacing:.08em;margin:-6px 0 14px;text-transform:uppercase;font-weight:500}
  .mtflbl{font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin:16px 0 10px}
  .mtflbl b{color:var(--ink2);font-weight:500}
  .mtf{display:flex;gap:6px;height:140px;align-items:center;margin-bottom:34px}
  .mcell{flex:1;position:relative;height:120px}
  .mctr{position:absolute;left:0;right:0;top:50%;height:0.5px;background:var(--line2)}
  .mbar{position:absolute;left:11%;right:11%;border-radius:2px;min-height:1px}
  .mlab{position:absolute;bottom:-30px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:9px;line-height:1.5;letter-spacing:.05em;color:var(--dim)}
  .mval{position:absolute;left:0;right:0;text-align:center;font-family:var(--mono);font-size:8px;font-weight:500}
  .subtabs{display:flex;gap:0;border:0.8px solid rgba(0,212,255,.14);margin-bottom:12px}
  .subtab{flex:1;text-align:center;padding:7px 4px;font-size:9px;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);cursor:pointer;border-right:0.6px solid var(--line)}
  .subtab:last-child{border-right:none}
  .subtab.on{color:var(--crk);font-weight:500;box-shadow:inset 0 -2px 0 var(--crk)}
  .subtab.idle{color:var(--mute);cursor:default}
  .pprice{text-align:right;font-size:13px;font-weight:500;color:var(--ink);font-variant-numeric:tabular-nums;text-shadow:0 0 6px rgba(0,212,255,.35)}
  .prow{display:grid;grid-template-columns:48px 14px 1fr 58px 44px;align-items:center;gap:8px;padding:7px 0;border-bottom:0.4px solid var(--line);cursor:pointer}
  .prow.sel{background:rgba(0,212,255,.07)}
  .pmtf{display:flex;gap:2px;height:26px;align-items:center}
  .pcell{flex:1;position:relative;height:24px}
  .pbar{position:absolute;left:1px;right:1px;border-radius:1px;min-height:1px}
  .rval .gly{margin-right:3px}
  .pill .gly{margin-right:5px;opacity:.85}
  .gauge{height:10px;background:var(--panel);border:0.6px solid var(--line);border-radius:5px;position:relative;margin-bottom:24px}
  .gmid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--dim)}
  .gbar{position:absolute;top:1px;bottom:1px;border-radius:3px}
  .sub{display:flex;justify-content:space-between;padding:9px 0;border-top:0.6px solid var(--line);font-size:12px}
  .sub .k{font-family:var(--mono);letter-spacing:.12em;color:var(--ink2);text-transform:uppercase;font-size:10px}
  .sub .v{font-variant-numeric:tabular-nums}
  /* middle table */
  .row{display:grid;grid-template-columns:44px 14px 1fr 62px 46px;align-items:center;gap:8px;padding:6px 0;border-bottom:0.4px solid var(--line);cursor:pointer;font-size:12px}
  .rpx{text-align:right;font-size:12.5px;color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
  .row:hover{background:rgba(0,212,255,.04)}
  .row.sel{background:rgba(0,212,255,.07)}
  .rtkn{font-variant-numeric:tabular-nums;color:var(--ink)}
  .track{position:relative;height:11px;background:var(--panel);border-radius:3px}
  .tmid{position:absolute;left:50%;top:0;bottom:0;width:1px;background:var(--dim)}
  .tbar{position:absolute;top:1px;bottom:1px;border-radius:2px}
  .rval{text-align:right;font-variant-numeric:tabular-nums}
  /* right extremes */
  .pill{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;margin-bottom:6px;border-radius:6px;font-size:12px;border:0.6px solid var(--line)}
  .pill .t{font-variant-numeric:tabular-nums}
  .ehdr{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin:4px 0 8px}
  .foot{border:0.8px solid rgba(0,212,255,.12);padding:12px 18px;margin-top:14px;display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  /* iPad / phone — stack the three zones so nothing breaks */
  @media (max-width:1000px){
    body{padding:16px 14px}
    .grid{grid-template-columns:1fr;gap:12px}
    .zone{min-height:auto}
    .word{letter-spacing:.4em;font-size:17px}
    .tab{letter-spacing:.1em;padding:9px 2px}
  }
  @media (max-width:560px){ .word{letter-spacing:.25em;font-size:15px} .rgeiger{font-size:46px} }
  .vdot{display:inline-block;border-radius:50%;vertical-align:middle}
  .vcell{display:flex;align-items:center;justify-content:center}
  @keyframes vp{0%{box-shadow:0 0 0 0 rgba(200,255,0,.5)}70%{box-shadow:0 0 0 9px rgba(200,255,0,0)}100%{box-shadow:0 0 0 0 rgba(200,255,0,0)}}

var _ch=null;
function drawChart(t){
  try{
    var el=document.getElementById('chart'); if(!el) return;
    var d=CD[t];
    if(!d||!d.b||!d.b.length){el.innerHTML='<div style="color:var(--dim);font-size:11px;padding:24px 8px;">no daily history for '+t+'</div>';return;}
    var b=d.b, n=b.length, W=el.clientWidth||320, H=210, P=10;
    var cls=b.map(function(x){return x[4];});
    var mn=Math.min.apply(null,cls), mx=Math.max.apply(null,cls), rng=(mx-mn)||1;
    var up=cls[n-1]>=cls[0], cc=up?'#00FFA3':'#FF2D55';
    var X=function(i){return P+(W-2*P)*i/(n-1);};
    var Y=function(v){return P+(H-2*P)*(1-(v-mn)/rng);};
    var line=cls.map(function(v,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(v).toFixed(1);}).join(' ');
    var area=line+' L'+X(n-1).toFixed(1)+' '+(H-P)+' L'+X(0).toFixed(1)+' '+(H-P)+' Z';
    var ema=d.e?d.e.map(function(e,i){return (i?'L':'M')+X(i).toFixed(1)+' '+Y(e[2]).toFixed(1);}).join(' '):'';
    var gid='g_'+t.replace(/[^A-Za-z0-9]/g,'');
    el.innerHTML='<svg width="100%" height="'+H+'" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="none" style="display:block">'
      +'<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1">'
      +'<stop offset="0" stop-color="'+cc+'" stop-opacity="0.30"/><stop offset="1" stop-color="'+cc+'" stop-opacity="0"/></linearGradient></defs>'
      +'<path d="'+area+'" fill="url(#'+gid+')"/>'
      +(ema?'<path d="'+ema+'" fill="none" stroke="#00D4FF" stroke-width="1" stroke-opacity="0.35" vector-effect="non-scaling-stroke"/>':'')
      +'<path d="'+line+'" fill="none" stroke="'+cc+'" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke" style="filter:drop-shadow(0 0 5px '+cc+')"/>'
      +'<circle cx="'+X(n-1).toFixed(1)+'" cy="'+Y(cls[n-1]).toFixed(1)+'" r="3" fill="'+cc+'" style="filter:drop-shadow(0 0 5px '+cc+')"/>'
      +'</svg>';
  }catch(e){var el=document.getElementById('chart'); if(el) el.innerHTML='<div style="color:var(--dim);font-size:11px;padding:24px 8px;">chart unavailable</div>';}
}
let filter="ALL", sel="NQ";
const tabsEl=document.getElementById('tabs');
COH.forEach(c=>{const d=document.createElement('div');d.className='tab'+(c==filter?' on':'');d.textContent=c;d.onclick=()=>{filter=c;render();};tabsEl.appendChild(d);});
let midTab="GEIGER";
const SUBTABS=["GEIGER","PARTS","· · ·","· · ·"];
const subEl=document.getElementById('subtabs');
SUBTABS.forEach((s,i)=>{const d=document.createElement('div');const idle=i>=2;d.className='subtab'+(s==midTab?' on':'')+(idle?' idle':'');d.textContent=s;if(!idle)d.onclick=()=>{midTab=s;render();};subEl.appendChild(d);});
function rows(){return D.filter(r=>filter=="ALL"||r[1]==filter);}
function render(){
  [...tabsEl.children].forEach((t,i)=>t.className='tab'+(COH[i]==filter?' on':''));
  // middle — sub-tabs: GEIGER (composite) | PARTS (per-ticker MTF) | idle
  [...subEl.children].forEach((tb,i)=>{tb.className='subtab'+(SUBTABS[i]==midTab?' on':'')+(i>=2?' idle':'');});
  const mid=document.getElementById('mid');mid.innerHTML='';
  if(midTab==="PARTS"){
    rows().forEach(r=>{const[t,co,g]=r;const c=col(g);
      const cells=(CMP[t]||[]).map(([tf,v])=>{const up=v>=0;const h=Math.round(Math.min(Math.abs(v),1)*44);const cc=col(v);return `<div class="pcell"><div class="pbar" style="${up?'bottom:50%':'top:50%'};height:${h}%;background:${cc};box-shadow:0 0 4px ${cc}"></div></div>`;}).join('');
      const div=document.createElement('div');div.className='prow'+(t==sel?' sel':'');
      div.innerHTML=`<div class="rtkn">${t}</div><div class="vcell">${voldot(t)}</div><div class="pmtf">${cells}</div><div class="pprice">${fmtpx(PX[t])}</div><div class="rval" style="color:${c}"><span class="gly">${gly(g)}</span>${g>=0?'+':''}${g.toFixed(2)}</div>`;
      div.onclick=()=>{sel=t;render();};mid.appendChild(div);});
  } else {
    rows().forEach(r=>{const[t,co,g]=r;const pct=Math.min(Math.abs(g)/0.7,1)*48,pos=g>=0,c=col(g);
      const bar=pos?`left:50%;width:${pct}%;`:`right:50%;width:${pct}%;`;
      const div=document.createElement('div');div.className='row'+(t==sel?' sel':'');
      div.innerHTML=`<div class="rtkn">${t}</div><div class="vcell">${voldot(t)}</div><div class="track"><div class="tmid"></div><div class="tbar" style="${bar}background:${c};${Math.abs(g)>=0.3?'box-shadow:0 0 8px '+c:''}"></div></div><div class="rpx">${fmtpx(PX[t])}</div><div class="rval" style="color:${c}"><span class="gly">${gly(g)}</span>${g>=0?'+':''}${g.toFixed(2)}</div>`;
      div.onclick=()=>{sel=t;render();};mid.appendChild(div);});
  }
  // left
  const r=D.find(x=>x[0]==sel)||D[0];const[t,co,g,tr,hh,mo]=r;const c=col(g);
  const pct=Math.min(Math.abs(g)/0.7,1)*48,bar=g>=0?`left:50%;width:${pct}%;`:`right:50%;width:${pct}%;`;
  document.getElementById('left').innerHTML=`
    <div class="rtk">${t}</div><div class="rco">${co}</div>
    <div class="rprice"><svg width="14" height="22" viewBox="0 0 24 24" fill="none" stroke="#00D4FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1.5v21M17 5.6c-1-1.5-2.9-2.3-5-2.3-3 0-5 1.4-5 3.6 0 5 10 2.7 10 7.8 0 2.3-2.2 3.8-5.2 3.8-2.3 0-4.3-.9-5.3-2.4"/></svg><span>${fmtpx(PX[t])}</span><span class="lbl">last</span></div>
    <div class="rvol" style="color:var(--ink2)">VOLUME ${voldot(t,1.7)}</div>
    <div class="rgeiger" style="color:${c}">${g>=0?'+':''}${g.toFixed(3)}</div>
    <div class="rband" style="color:${c}">${gly(g)} ${band(g,t)}</div>
    <div class="dens" style="color:${c}">${dens(g)}</div>
    <div class="gauge"><div class="gmid"></div><div class="gbar" style="${bar}background:${c};box-shadow:0 0 10px ${c}"></div></div>
    <div class="mtflbl">Multi-timeframe · <b>the parts</b> · up=bull down=bear</div>
    <div class="mtf">${(CMP[t]||[]).map(([tf,v])=>{const up=v>=0;const h=Math.round(Math.min(Math.abs(v),1)*46);const cc=col(v);const vp=Math.min(h+50,92);return `<div class="mcell"><div class="mctr"></div><div class="mbar" style="${up?'bottom:50%':'top:50%'};height:${h}%;background:${cc};box-shadow:0 0 8px ${cc}"></div><div class="mlab">${tf}<br><b style="color:${cc}">${v>0?'+':''}${v.toFixed(2)}</b></div></div>`;}).join('')}</div>
    <div style="font-family:var(--mono);font-size:8px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin:14px 0 4px;">Chart · daily · close + EMA 21</div>
    <div id="chart" style="height:230px;border:0.5px solid var(--line);border-radius:6px;overflow:hidden;"></div>
    <div class="sub"><span class="k">Trend</span><span class="v" style="color:${col(tr)}">${tr>=0?'+':''}${tr.toFixed(2)}</span></div>
    <div class="sub"><span class="k">Volume</span><span class="v" style="color:${col(hh)}">${hh>=0?'+':''}${hh.toFixed(2)}</span></div>
    <div class="sub"><span class="k">Momentum</span><span class="v" style="color:${col(mo)}">${mo>=0?'+':''}${mo.toFixed(2)}</span></div>`;
  drawChart(t);
  // right extremes
  const bull=[...D].sort((a,b)=>b[2]-a[2]).slice(0,6),bear=[...D].sort((a,b)=>a[2]-b[2]).slice(0,6);
  const pill=(r,c)=>`<div class="pill" style="border-color:${c}33"><span><span class="gly" style="color:${c}">${gly(r[2])}</span>${voldot(r[0])} ${r[0]}</span><span class="t" style="color:${c}">${r[2]>=0?'+':''}${r[2].toFixed(2)} <span style="opacity:.6">${dens(r[2])}</span></span></div>`;
  document.getElementById('right').innerHTML=`<div class="ehdr" style="color:${BULL}">strongest bull</div>${bull.map(r=>pill(r,BULL)).join('')}<div class="ehdr" style="color:${BEAR};margin-top:14px">strongest bear</div>${bear.map(r=>pill(r,BEAR)).join('')}`;
}
render();
// SYSTEMS light — truthful: reads data/status.json (IB port + feed freshness). Never fake-green.
(function(){
  const ld=document.getElementById('sysld');if(!ld)return;
  fetch('data/status.json',{cache:'no-store'}).then(r=>r.json()).then(s=>{
    const ep=s.feed_newest, m=ep?(Date.now()/1000-ep)/60:null;
    let cls=(!s.ib_port_open||m==null)?'down':(m<3?'live':(m<2880?'idle':'down'));
    ld.className='ld '+cls;
    ld.parentElement.title='IB port '+(s.ib_port_open?'open':'closed')+' · feed '+(m==null?'no data':Math.round(m)+'m old');
  }).catch(()=>{ld.className='ld idle';});
})();
